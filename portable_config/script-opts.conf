######## 2025 migrated script options (safe patch block) ########
# Keep 2026 single-file script-opts.conf structure.
# Append only 2025 options for scripts that still exist or were intentionally migrated.
# Do not activate replaced scripts here: playlist_osd, thumbfast, contextmenu_plus.
# Security: sub_fastwhisper-api_key is intentionally blank; fill locally only if needed.

# --- auto_load_fonts: load subtitle/font directories (auto_load_fonts.conf) ---
script-opts-append = auto_load_fonts-compatible_mode=no
script-opts-append = auto_load_fonts-compatible_dir=~~/.fonts

# --- mpv_torrserver: TorrServer integration (mpv_torrserver.conf) ---
script-opts-append = mpv_torrserver-server=http://localhost:8090
script-opts-append = mpv_torrserver-torrserver_init=no
script-opts-append = mpv_torrserver-torrserver_path=TorrServer
script-opts-append = mpv_torrserver-search_for_external_tracks=yes

# --- quality-menu: stream quality selection menu (quality-menu.conf) ---
script-opts-append = quality-menu-up_binding=UP WHEEL_UP
script-opts-append = quality-menu-down_binding=DOWN WHEEL_DOWN
script-opts-append = quality-menu-select_binding=ENTER MBTN_LEFT
script-opts-append = quality-menu-close_menu_binding=ESC MBTN_RIGHT
script-opts-append = quality-menu-selected_and_active=▶  -
script-opts-append = quality-menu-selected_and_inactive=●  -
script-opts-append = quality-menu-unselected_and_active=▷ -
script-opts-append = quality-menu-unselected_and_inactive=○ -
script-opts-append = quality-menu-scale_playlist_by_window=yes
script-opts-append = quality-menu-style_ass_tags={\\fnmonospace\\fs25\\bord1}
script-opts-append = quality-menu-shift_x=0
script-opts-append = quality-menu-shift_y=0
script-opts-append = quality-menu-text_padding_x=5
script-opts-append = quality-menu-text_padding_y=10
script-opts-append = quality-menu-curtain_opacity=0.7
script-opts-append = quality-menu-menu_timeout=6
script-opts-append = quality-menu-fetch_formats=yes
script-opts-append = quality-menu-quality_strings_video=[ {"4320p" : "bestvideo[height<=?4320p]"}, {"2160p" : "bestvideo[height<=?2160]"}, {"1440p" : "bestvideo[height<=?1440]"}, {"1080p" : "bestvideo[height<=?1080]"}, {"720p" : "bestvideo[height<=?720]"}, {"480p" : "bestvideo[height<=?480]"}, {"360p" : "bestvideo[height<=?360]"}, {"240p" : "bestvideo[height<=?240]"}, {"144p" : "bestvideo[height<=?144]"} ]
script-opts-append = quality-menu-quality_strings_audio=[ {"default" : "bestaudio"} ]
script-opts-append = quality-menu-start_with_menu=no
script-opts-append = quality-menu-include_unknown=no
script-opts-append = quality-menu-hide_identical_columns=yes
script-opts-append = quality-menu-columns_video=-resolution,frame_rate,dynamic_range|language,bitrate_total,size,-codec_video,-codec_audio
script-opts-append = quality-menu-columns_audio=audio_sample_rate,bitrate_total|size,language,-codec_audio
script-opts-append = quality-menu-sort_video=height,fps,tbr,size,format_id
script-opts-append = quality-menu-sort_audio=asr,tbr,size,format_id

# --- recentmenu: recent play history menu (recentmenu.conf) ---
script-opts-append = recentmenu-enabled=yes
script-opts-append = recentmenu-path=~~/recent.json
script-opts-append = recentmenu-title=近期播放
script-opts-append = recentmenu-length=20
script-opts-append = recentmenu-width=70
script-opts-append = recentmenu-ignore_same_series=yes

# --- sponsorblock_minimal: SponsorBlock skip segments (sponsorblock_minimal.conf) ---
script-opts-append = sponsorblock_minimal-youtube_sponsor_server=https://sponsor.ajay.app/api/skipSegments
script-opts-append = sponsorblock_minimal-bilibili_sponsor_server=https://bsbsb.top/api/skipSegments
script-opts-append = sponsorblock_minimal-categories="sponsor"

# --- sub_fastwhisper: faster-whisper subtitle transcription (sub_fastwhisper.conf) ---
script-opts-append = sub_fastwhisper-fast_whisper_path=portable_config/faster-whisper-win/faster-whisper.exe
script-opts-append = sub_fastwhisper-model=large-v3
script-opts-append = sub_fastwhisper-device=cuda
script-opts-append = sub_fastwhisper-max_line_width=100
script-opts-append = sub_fastwhisper-output_path=source
script-opts-append = sub_fastwhisper-update_interval=20
script-opts-append = sub_fastwhisper-use_segment=no
script-opts-append = sub_fastwhisper-segment_duration=10
script-opts-append = sub_fastwhisper-api_url=https://open.bigmodel.cn/api/paas/v4/chat/completions
script-opts-append = sub_fastwhisper-api_key=
script-opts-append = sub_fastwhisper-api_mode=glm-4-flash
script-opts-append = sub_fastwhisper-api_temperature=0.95
script-opts-append = sub_fastwhisper-api_rate=15
script-opts-append = sub_fastwhisper-translate=Chinese
script-opts-append = sub_fastwhisper-font_name=Noto Sans CJK SC
