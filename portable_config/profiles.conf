[HDR]
 profile-desc = HDR自动配置(融合版: bt.2020+PQ/HLG)
 profile-cond = p["video-params/sig-peak"]>1
 profile-cond = p["video-params/primaries"] == "bt.2020" and (p["video-params/gamma"] == "pq" or p["video-params/gamma"] == "hlg")
 profile-restore = copy
 blend-subtitles = no
 target-trc = pq
 target-peak = 1000
 target-colorspace-hint = yes
 hdr-reference-white = 100
 hdr-peak-percentile = 99.99
#sub-color = 0.7
#sub-border-color = 0.1
#sub-back-color = "#00000000"
#sub-shadow-offset = 0


[BiliBili_ytdl]
 profile-desc = Bilibili-ytdl(自动匹配bilibili在线视频)
 profile-cond = path:match("bilibili.com/")~=nil
 profile-restore = copy
 ytdl-format = bestvideo[height<=?2160][vcodec!=?av01]+bestaudio/best


[SDR]
 profile-desc = SDR视频自动配置
 profile-cond = p["video-params/sig-peak"] == nil or p["video-params/sig-peak"] <= 1
 target-trc = auto
 target-peak = 203
 target-colorspace-hint = no
 blend-subtitles = yes


