 MBTN_MID          script-binding uosc/menu                              # 打开uosc菜单
 MBTN_RIGHT        script-binding uosc/menu
 Ctrl+MBTN_RIGHT   context-menu                                          # 打开原生菜单
 MBTN_RIGHT_DBL    ignore

